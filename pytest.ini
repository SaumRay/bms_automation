[pytest]
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

markers =
    smoke:        Quick sanity checks – run on every deploy
    regression:   Full regression suite
    scroll:       Scroll & lazy-load tests
    navigation:   Navigation & routing tests
    search:       Search functionality tests

log_cli = true
log_cli_level = INFO
